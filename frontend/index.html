  <!-- Service Worker: Registro + Verificação de update automático a cada 30min -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        var isLocalhost = window.location.hostname === 'localhost' ||
                          window.location.hostname === '127.0.0.1' ||
                          window.location.hostname.startsWith('192.168.');

        if (isLocalhost) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
          });
        } else {
          navigator.serviceWorker.register('/service-worker.js').then(function(reg) {
            // Verifica se já tem um SW esperando (caso de reload sem fechar a aba)
            if (reg.waiting) { showUpdateToast(reg.waiting); }

            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast(newWorker);
                }
              });
            });

            // Verifica por updates a cada 30 minutos quando o app está aberto
            setInterval(function() { reg.update(); }, 30 * 60 * 1000);
          }).catch(function(err) {
            console.warn('[SW] Registro falhou:', err);
          });

          // Recarrega quando o novo SW toma controle (após clicar "Atualizar agora")
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!refreshing) { refreshing = true; window.location.reload(); }
          });
        }
      });
    }

    function showUpdateToast(worker) {
      if (document.getElementById('sw-update-toast')) return;
      var toast = document.createElement('div');
      toast.id = 'sw-update-toast';
      toast.style.cssText = [
        'position:fixed','bottom:24px','left:50%','transform:translateX(-50%)',
        'z-index:99999','background:linear-gradient(135deg,#1e1b4b,#312e81)',
        'border:1px solid rgba(167,139,250,0.4)','border-radius:16px',
        'padding:14px 20px','display:flex','align-items:center','gap:12px',
        'box-shadow:0 8px 32px rgba(0,0,0,0.5)','color:#e2e8f0',
        'font-family:system-ui,sans-serif','font-size:13px','font-weight:500',
        'animation:swSlideUp .3s ease','max-width:90vw'
      ].join(';');

      var style = document.createElement('style');
      style.textContent = '@keyframes swSlideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
      document.head.appendChild(style);

      var icon = document.createElement('span');
      icon.style.fontSize = '18px';
      icon.textContent = '🚀';

      var msg = document.createElement('span');
      msg.textContent = 'Nova versão disponível!';

      var btnUpdate = document.createElement('button');
      btnUpdate.textContent = 'Atualizar agora';
      btnUpdate.style.cssText = 'background:linear-gradient(135deg,#a78bfa,#818cf8);color:white;border:none;border-radius:10px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.04em';
      btnUpdate.onclick = function() {
        toast.remove();
        worker.postMessage({ type: 'SKIP_WAITING' });
      };

      var btnClose = document.createElement('button');
      btnClose.textContent = '×';
      btnClose.style.cssText = 'background:transparent;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:20px;line-height:1;padding:0 2px';
      btnClose.onclick = function() { toast.remove(); };

      toast.appendChild(icon);
      toast.appendChild(msg);
      toast.appendChild(btnUpdate);
      toast.appendChild(btnClose);
      document.body.appendChild(toast);

      // Auto-remove após 15 segundos
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 15000);
    }
  </script>
